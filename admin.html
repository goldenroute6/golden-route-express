<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Route Express Admin Booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700;800;900&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=20260703-4">
    <link rel="stylesheet" href="css/responsive.css?v=20260703-4">
    <style>
        .admin-wrap {
            min-height: calc(100vh - 68px);
            padding: 3rem 1rem;
            background: linear-gradient(180deg, #F6F4F0, #ECE7DE);
        }

        .admin-shell {
            max-width: 980px;
            margin: 0 auto;
            display: grid;
            gap: 1rem;
        }

        .admin-head {
            background: var(--dark);
            color: var(--white);
            border-radius: var(--border-radius);
            border-top: 4px solid var(--gold);
            padding: 1.4rem;
        }

        .admin-head h1 {
            font-family: 'Raleway', sans-serif;
            font-size: 1.25rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.3rem;
        }

        .admin-head p {
            color: rgba(255, 255, 255, 0.78);
            margin: 0;
            font-size: 0.92rem;
        }

        .admin-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 1.25rem;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.9rem;
        }

        .admin-grid .form-group.full {
            grid-column: 1 / -1;
        }

        .admin-actions {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .admin-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            margin-bottom: 0.7rem;
            flex-wrap: wrap;
        }

        .admin-meta strong {
            color: var(--primary);
        }

        #adminSession,
        #bookingPanel,
        #bookingSuccess,
        #adminError,
        #adminNotice {
            display: none;
        }

        @media (max-width: 768px) {
            .admin-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">
                <span class="logo-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5L21 16z"/></svg>
                </span>
                <a href="./index.html">Golden Route Express</a>
            </div>
            <ul class="nav-menu">
                <li><a href="./index.html#tracker" class="nav-link active">Public Tracker</a></li>
            </ul>
        </div>
    </nav>

    <main class="admin-wrap">
        <div class="admin-shell">
            <section class="admin-head">
                <h1>Private Booking Console</h1>
                <p>Only authorized admin login can create shipments.</p>
            </section>

            <section class="admin-card" id="adminLoginPanel">
                <h3>Admin Sign In</h3>
                <p class="section-subtitle">Use your Supabase Auth admin account.</p>
                <form id="adminLoginForm" class="admin-grid" novalidate>
                    <div class="form-group full">
                        <label for="adminEmail">Email</label>
                        <input type="email" id="adminEmail" placeholder="admin@yourdomain.com" required>
                    </div>
                    <div class="form-group full">
                        <label for="adminPassword">Password</label>
                        <input type="password" id="adminPassword" placeholder="Enter password" required>
                    </div>
                    <div class="form-submit full">
                        <button type="submit" class="cta-button">Sign In</button>
                    </div>
                </form>
            </section>

            <section class="admin-card" id="adminSession">
                <div class="admin-meta">
                    <span>Signed in as <strong id="adminUserEmail"></strong></span>
                    <button type="button" class="cta-button cta-secondary" id="adminLogoutBtn">Sign Out</button>
                </div>
            </section>

            <section class="admin-card" id="bookingPanel">
                <h3>Create Shipment</h3>
                <form id="adminBookingForm" class="admin-grid" novalidate>
                    <div class="form-group">
                        <label for="senderName">Sender Name</label>
                        <input type="text" id="senderName" required>
                    </div>
                    <div class="form-group">
                        <label for="recipientName">Recipient Name</label>
                        <input type="text" id="recipientName" required>
                    </div>
                    <div class="form-group">
                        <label for="senderCity">Sender City</label>
                        <input type="text" id="senderCity" required>
                    </div>
                    <div class="form-group">
                        <label for="senderCountry">Sender Country</label>
                        <input type="text" id="senderCountry" required>
                    </div>
                    <div class="form-group">
                        <label for="recipientCity">Recipient City</label>
                        <input type="text" id="recipientCity" required>
                    </div>
                    <div class="form-group">
                        <label for="recipientCountry">Recipient Country</label>
                        <input type="text" id="recipientCountry" required>
                    </div>
                    <div class="form-group">
                        <label for="cargoDescription">Cargo Description</label>
                        <input type="text" id="cargoDescription" required>
                    </div>
                    <div class="form-group">
                        <label for="cargoWeight">Cargo Weight (kg)</label>
                        <input type="number" id="cargoWeight" min="0.1" step="0.1" required>
                    </div>
                    <div class="form-group full">
                        <label for="shippingType">Shipping Type</label>
                        <select id="shippingType" required>
                            <option value="">Select...</option>
                            <option value="air">Air Express</option>
                            <option value="sea">Sea Freight</option>
                            <option value="standard">Standard</option>
                        </select>
                    </div>
                    <div class="form-submit full">
                        <button type="submit" class="cta-button">Create Shipment</button>
                    </div>
                </form>
            </section>

            <section class="admin-card" id="bookingSuccess">
                <h3>Shipment Created</h3>
                <p>Tracking Number: <strong id="createdTrackingNumber"></strong></p>
            </section>

            <section class="message error" id="adminError"></section>
            <section class="message" id="adminNotice"></section>
        </div>
    </main>

    <script>
        window.GRE_SUPABASE_URL = 'https://nytgmlaiecrmrnymgclm.supabase.co';
        window.GRE_SUPABASE_ANON_KEY = 'sb_publishable_iub4F08jEnUrOyplZPz1zQ_w_nSIs8m';
        window.GRE_ADMIN_EMAIL = '';
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/admin.js?v=20260703-1"></script>
</body>
</html>
